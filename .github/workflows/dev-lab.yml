name: Dev Lab Auto-Committer

on:
  schedule:
    # 08:30, 14:30, 20:30 IST (03:00, 09:00, 15:00 UTC)
    - cron: "0 3,9,15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate entry
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash-lite
          LLM_PROVIDER: gemini
        run: node scripts/generate.mjs

      - name: Validate build
        run: node scripts/validate.mjs

      - name: Commit and push
        run: |
          git config user.name "dev-lab-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ src/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          COMMIT_MSG=$(node -e "console.log(require('./.pipeline-output.json').commitMessage)")
          git commit -m "$COMMIT_MSG"
          git push
